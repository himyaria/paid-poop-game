<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>带薪拉屎玩什么</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;600;700;800&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=brand-2">
</head>
<body>
  <main class="game-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-label="粑粑标志">
          <img src="assets/poop-logo-3d.png" alt="">
        </span>
        <div>
          <h1>带薪拉屎玩什么</h1>
          <p id="sceneSubtitle">今日场景 · 漫画卧室</p>
        </div>
      </div>

      <button class="hint-cta" id="hintButton" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.7.5 1 1.2 1 2.3h6c0-1.1.3-1.8 1-2.3A7 7 0 0 0 12 2Z"/></svg>
        <span>找不到点这里</span>
      </button>

      <div class="status-cluster">
        <div class="status-item timer" id="timerBox">
          <span class="status-label">剩余时间</span>
          <strong id="timer">05:00</strong>
        </div>
        <div class="status-item">
          <span class="status-label">已找到</span>
          <strong><span id="foundCount">0</span>/<span id="totalCount">8</span></strong>
        </div>
        <button class="icon-button" id="soundButton" type="button" aria-label="切换声音" title="切换声音">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5 6 9H3v6h3l5 4V5Zm5.2 3.2a5.4 5.4 0 0 1 0 7.6M19 5.4a9 9 0 0 1 0 13.2"/></svg>
        </button>
        <button class="icon-button" id="restartButton" type="button" aria-label="重新开始" title="重新开始">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0-2.3 5.7M20 4v7h-7"/></svg>
        </button>
      </div>
    </header>

    <section class="target-panel">
      <div class="target-heading">
        <div>
          <span class="eyebrow">本局任务</span>
          <h2>请找到这些物品</h2>
        </div>
      <p id="tipText">寻找藏入场景的物品，也别忽略房间原有陈设</p>
      </div>
      <div class="target-list" id="targetList"></div>
    </section>

    <section class="scene-wrap" id="sceneWrap">
      <canvas id="gameCanvas" width="1280" height="720" aria-label="寻物游戏场景"></canvas>
      <div class="scene-vignette"></div>
      <div class="scene-tag">第 <span id="roundNumber">01</span> 局</div>
      <div class="penalty" id="penalty">-5秒</div>

      <div class="selection-popover" id="selectionPopover">
        <span>确定选择这里？</span>
        <button class="confirm-button" id="confirmButton" type="button">确认</button>
        <button class="cancel-button" id="cancelButton" type="button" aria-label="取消">×</button>
      </div>
    </section>
  </main>

  <div class="modal-backdrop visible" id="startModal">
    <section class="modal">
      <div class="modal-symbol poop-symbol">
        <img src="assets/poop-logo-3d.png" alt="">
      </div>
      <span class="eyebrow">带薪拉屎玩什么</span>
      <h2 id="startTitle">卧室里藏着什么？</h2>
      <p id="startDescription">在五分钟内找到清单中的全部物品。它们会伪装成家具细节或只露出一角，每次点错会扣除 5 秒。</p>
      <button class="primary-button" id="startButton" type="button">开始寻找</button>
    </section>
  </div>

  <div class="modal-backdrop" id="resultModal">
    <section class="modal">
      <div class="result-logo">
        <img src="assets/poop-logo-3d.png" alt="带薪拉屎玩什么">
      </div>
      <div class="modal-symbol" id="resultSymbol">✓</div>
      <span class="eyebrow" id="resultEyebrow">寻物完成</span>
      <h2 id="resultTitle">全部找到了！</h2>
      <p id="resultText"></p>
      <div class="result-ranking" id="resultRanking" hidden>
        <div class="result-rank-main">
          <span>全球快速通关排名</span>
          <strong>第 <b id="globalRank">9,672</b> 名</strong>
        </div>
        <div class="result-stats">
          <div>
            <span>通关用时</span>
            <strong id="clearTime">00:30</strong>
          </div>
          <div>
            <span>击败全球玩家</span>
            <strong id="beatPercent">76.21%</strong>
          </div>
        </div>
      </div>
      <button class="primary-button" id="againButton" type="button">再玩一局</button>
    </section>
  </div>

  <div class="modal-backdrop" id="hintModal">
    <section class="modal hint-modal">
      <div class="modal-symbol">!</div>
      <span class="eyebrow">请求提醒</span>
      <h2>先输入认输文字</h2>
      <p>请手动输入：<strong id="surrenderPhrase">我是大笨蛋</strong></p>
      <input class="surrender-input" id="surrenderInput" type="text" autocomplete="off" spellcheck="false">
      <p class="hint-error" id="hintError"></p>
      <div class="modal-actions">
        <button class="primary-button" id="submitHintButton" type="button">提交并提醒</button>
        <button class="secondary-button" id="cancelHintButton" type="button">取消</button>
      </div>
    </section>
  </div>

  <audio id="introMusic" src="assets/intro-music.wav" preload="auto" loop></audio>
  <audio id="backgroundMusic" src="assets/background-music.wav" preload="auto" loop></audio>
  <script src="game.js?v=beach-15"></script>
</body>
</html>
